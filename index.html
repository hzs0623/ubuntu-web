 <!DOCTYPE html>                                                                                                                                                                                           
  <html lang="zh">                                                                                                                                   
  <head>                                                                                                                                                                                                  
  <meta charset="UTF-8">                                                                                                                                                                                  
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Daes.fun</title>                                                                                                                                                                                   
  <style>
  *{margin:0;padding:0;box-sizing:border-box}                                                                                                                                                               
  body{background:#020817;color:#e2e8f0;font-family:'Courier New',monospace;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}                                            
  canvas{position:fixed;top:0;left:0;z-index:0}                                                                                                                                                             
  .wrap{position:relative;z-index:1;text-align:center;padding:20px}                                                                                                                                         
  .tag{color:#4ade80;font-size:14px;margin-bottom:16px;opacity:0;animation:fi 0.5s ease 0.5s forwards}                                                                                                      
  .name{font-size:80px;font-weight:700;background:linear-gradient(135deg,#6366f1,#8b5cf6,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;o
  pacity:0;animation:su 0.8s ease 0.8s forwards}                                                                                                                                                            
  .sub{font-size:13px;color:#475569;letter-spacing:4px;text-transform:uppercase;margin-bottom:40px;opacity:0;animation:fi 0.5s ease 1.2s forwards}                                                          
  .typing{font-size:14px;color:#4ade80;height:22px;margin-bottom:40px;opacity:0;animation:fi 0.5s ease 1.5s forwards}                                                                                       
  .cur{display:inline-block;width:8px;height:14px;background:#4ade80;animation:blink 1s step-end infinite;vertical-align:middle;margin-left:2px}                                                            
  .btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;opacity:0;animation:fi 0.5s ease 2s forwards}                                                                                           
  .btn{padding:11px 28px;border-radius:8px;font-size:13px;font-family:'Courier New',monospace;cursor:pointer;text-decoration:none;transition:all                                                            
  0.3s;display:flex;align-items:center;gap:8px;letter-spacing:1px}                                                                                                                                          
  .bp{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none}                                                                                                                            
  .bp:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(99,102,241,0.4)}                                                                                                                         
  .bo{background:transparent;color:#94a3b8;border:1px solid #1e293b}                                                                                                                                        
  .bo:hover{border-color:#6366f1;color:#a5b4fc;transform:translateY(-3px)}                                                                                                                                  
  .bar{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:28px;opacity:0;animation:fi 0.5s ease 2.5s forwards;white-space:nowrap}                                              
  .si{display:flex;align-items:center;gap:6px;font-size:11px;color:#334155}                                                                                                                                 
  .dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s ease infinite}                                                                                                          
  .dot.b{background:#3b82f6;animation-delay:.7s}                                                                                                                                                            
  .dot.c{background:#8b5cf6;animation-delay:1.4s}                                                                                                                                                           
  @keyframes fi{to{opacity:1}}                                                                                                                                                                              
  @keyframes su{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}                                                                                                            
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}                                                                                                                                                        
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}                                                                                                              
  @media(max-width:500px){.name{font-size:52px}.bar{gap:14px}}                                                                                                                                              
  </style>                                                                                                                                                                                                  
  </head>                                                                                                                                                                                                   
  <body>                                                                                                                                                                                                    
  <canvas id="c"></canvas>                                                                                                                                                                                  
  <div class="wrap">                                                                                                                                                                                      
    <div class="tag">~/daes.fun $</div>                                                                                                                                                                   
    <div class="name">Daes</div>                                                                                                                                                                            
    <div class="sub">Personal Server &middot; Hong Kong</div>                                                                                                                                               
    <div class="typing"><span id="typed"></span><span class="cur"></span></div>                                                                                                                             
    <div class="btns">                                                                                                                                                                                      
      <a href="/monitor" class="btn bp">&#9646;&#9646; 服务器监控</a>                                                                                                                                       

    </div>                                                                                                                                                                                                  
  </div>                                                                                                                                                                                                    
  <div class="bar">                                                                                                                                                                                         
    <div class="si"><div class="dot"></div>Hysteria2 Online</div>                                                                                                                                           
    <div class="si"><div class="dot b"></div>Shadowsocks Online</div>                                                                                                                                       
    <div class="si"><div class="dot c"></div>HongKong · BGP</div>                                                                                                                                           
  </div>                                                                                                                                                                                                    
  <script>                                                                                                                                                                                                  
  var c=document.getElementById('c'),ctx=c.getContext('2d');                                                                                                                                                
  var W=c.width=window.innerWidth,H=c.height=window.innerHeight;                                                                                                                                            
  window.onresize=function(){W=c.width=window.innerWidth;H=c.height=window.innerHeight};                                                                                                                  
  var N=90,ps=[];                                                                                                                                                                                           
  for(var i=0;i<N;i++) ps.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.6,r:Math.random()*1.5+.5});                                                             
  function draw(){                                                                                                                                                                                          
    ctx.clearRect(0,0,W,H);                                                                                                                                                                                 
    for(var i=0;i<N;i++){                                                                                                                                                                                   
      var p=ps[i];                                                                                                                                                                                          
      p.x+=p.vx; p.y+=p.vy;                                                                                                                                                                               
      if(p.x<0||p.x>W) p.vx*=-1;                                                                                                                                                                            
      if(p.y<0||p.y>H) p.vy*=-1;                                                                                                                                                                            
      ctx.beginPath();                                                                                                                                                                                      
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);                                                                                                                                                                     
      ctx.fillStyle='rgba(99,102,241,0.5)';                                                                                                                                                                 
      ctx.fill();                                                                                                                                                                                           
      for(var j=i+1;j<N;j++){                                                                                                                                                                               
        var dx=p.x-ps[j].x,dy=p.y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);                                                                                                                                         
        if(d<130){                                                                                                                                                                                          
          ctx.beginPath();                                                                                                                                                                                  
          ctx.moveTo(p.x,p.y);                                                                                                                                                                              
          ctx.lineTo(ps[j].x,ps[j].y);                                                                                                                                                                      
          ctx.strokeStyle='rgba(99,102,241,'+(1-d/130)*.12+')';                                                                                                                                           
          ctx.lineWidth=.5;                                                                                                                                                                                 
          ctx.stroke();                                                                                                                              
        }                                                                                                                                                                                                   
      }                                                                                                                                                                                                   
    }                                                   
    requestAnimationFrame(draw);                                                                                                                                                                            
  }
  draw();                                                                                                                                                                                                   
  var lines=['Hello World!','Passionate about tech & code.','Building things on the internet.','Based in Shenzhen, China.'];                         
  var li=0,ci=0,del=false,el=document.getElementById('typed');                                                                                                                                              
  function type(){                                                                                                                                                                                          
    var t=lines[li];                                                                                                                                                                                        
    if(!del){                                                                                                                                                                                               
      el.textContent=t.slice(0,++ci);                                                                                                                                                                       
      if(ci===t.length){del=true;setTimeout(type,2000);return;}                                                                                                                                           
      setTimeout(type,80);                                                                                                                                                                                  
    } else {                                                                                                                                         
      el.textContent=t.slice(0,--ci);                                                                                                                                                                       
      if(ci===0){del=false;li=(li+1)%lines.length;setTimeout(type,400);return;}                                                                                                                             
      setTimeout(type,40);                                                                                                                                                                                  
    }                                                                                                                                                                                                       
  }                                                                                                                                                                                                         
  setTimeout(type,2200);                                                                                                                                                                                    
  </script>                                                                                                                                                                                               
  </body>                                                                                                                                                                                                   
  </html>
