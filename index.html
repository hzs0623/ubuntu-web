<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daes | Personal Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        :root {
            --color-primary: #22d3ee;
            --color-secondary: #a855f7;
            --color-dark: #080812;
            --color-glass: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            transition: background 0.8s ease;
        }

        /* ========== 暗黑主页 样式 ========== */
        .page-main {
            background: linear-gradient(135deg, #09091a, #0c0c20, #050510);
            color: #f0f0f0;
        }
        .bg-dot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
            background-image: 
                radial-gradient(circle at 20% 30%, var(--color-primary) 1px, transparent 1px),
                radial-gradient(circle at 80% 20%, var(--color-secondary) 1px, transparent 1px),
                radial-gradient(circle at 40% 70%, #ec4899 1px, transparent 1px);
            background-size: 120px 120px;
            animation: bgMove 20s linear infinite;
        }
        @keyframes bgMove {
            0% { background-position: 0 0; }
            100% { background-position: 120px 120px; }
        }

        /* ========== 暧昧页面 样式 ========== */
        .page-love {
            background: linear-gradient(145deg, #ffe6f0, #f0e8ff, #ffeef8);
            color: #b06892;
        }
        .love-box {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
            display: none;
        }
        .heart {
            position: absolute;
            color: #ff8fb3;
            opacity: 0.6;
            animation: floatUp 12s linear infinite;
        }
        @keyframes floatUp {
            0% {bottom: -10%;transform: translateX(0) rotate(0deg);opacity: 0;}
            20% {opacity: 0.7;}
            80% {opacity: 0.5;}
            100% {bottom: 105%;transform: translateX(60px) rotate(360deg);opacity: 0;}
        }
        @keyframes softBreath {
            0% { filter: brightness(1) blur(0px); }
            50% { filter: brightness(1.05) blur(1px); }
            100% { filter: brightness(1) blur(0px); }
        }
        .page-love body {
            animation: softBreath 6s ease-in-out infinite;
        }

        /* 共用布局 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.2rem 4rem;
            z-index: 99;
            transition: 0.3s ease;
        }
        nav.nav-blur {
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-glass);
        }
        .page-main .nav-blur {
            background: rgba(8, 8, 18, 0.75);
        }
        .page-love .nav-blur {
            background: rgba(255,255,255,0.25);
        }

        .nav-wrap {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .nav-menu a {
            text-decoration: none;
            margin-left: 2rem;
            transition: 0.3s;
        }
        .page-main .nav-menu a {color: #ccc;}
        .page-main .nav-menu a:hover {color: var(--color-primary);}
        .page-love .nav-menu a {color: #c787ab;}
        .page-love .nav-menu a:hover {color: #d86b9c;}

        .container {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-top: 4rem;
        }
        .hero h1 {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            line-height: 1.2;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #fff, var(--color-primary), var(--color-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            filter: drop-shadow(0 0 12px rgba(34, 211, 238, 0.4));
        }
        .page-love .hero h1 {
            background: linear-gradient(90deg, #d86b9c, #f8a5c2);
            -webkit-background-clip: text;
            background-clip: text;
            filter: drop-shadow(0 0 8px rgba(255,140,180,0.3));
        }
        .hero p {
            font-size: 1.1rem;
            max-width: 600px;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }
        .page-main .hero p {color: #a9a9c3;}
        .page-love .hero p {color: #b06892;}

        .btn-group {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 0.9rem 2.2rem;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .page-main .btn-outline {
            border: 1px solid var(--color-primary);
            color: var(--color-primary);
            background: transparent;
        }
        .page-main .btn-outline:hover {
            background: rgba(34, 211, 238, 0.15);
            transform: translateY(-3px);
        }
        .page-main .btn-fill {
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            color: #fff;
        }
        .page-love .btn-fill {
            background: linear-gradient(90deg, #f8a5c2, #d86b9c);
            color: #fff;
        }
        .btn-fill:hover {
            transform: translateY(-3px);
        }

        /* 内容区块默认隐藏，简化只留首页切换 */
        section {display: none;}

        .down-arrow {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            animation: bounce 1.8s infinite;
            font-size: 1.8rem;
        }
        .page-main .down-arrow {color: var(--color-primary);}
        .page-love .down-arrow {color: #ff8fb3;}
        @keyframes bounce {
            0%,100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* 页面容器切换 */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }
    </style>
</head>
<body>
    <!-- 暗黑主页 -->
    <div class="page page-main active" id="mainPage">
        <div class="bg-dot"></div>
        <nav id="navbar">
            <div class="nav-wrap">
                <div class="logo">daes</div>
                <div class="nav-menu">
                    <a href="javascript:switchLove()">快乐星球</a>
                </div>
            </div>
        </nav>

        <section id="home" class="hero">
            <div class="container">
                <h1>Hello, I'm daes</h1>
                <p>热爱代码 · 原生手写 · 极简暗黑风<br>安静自由，保持独特</p>
                <div class="btn-group">
                    <button class="btn btn-outline" onclick="switchLove()">进入暧昧星球</button>
                </div>
            </div>
            <div class="down-arrow">↓</div>
        </section>
    </div>

    <!-- 暧昧页面 -->
    <div class="page page-love" id="lovePage">
        <div class="love-box" id="loveBox"></div>
        <nav id="navbar2">
            <div class="nav-wrap">
                <div class="logo">daes</div>
                <div class="nav-menu">
                    <a href="javascript:switchMain()">返回主页</a>
                </div>
            </div>
        </nav>

        <section class="hero">
            <div class="container">
                <h1>予你温柔</h1>
                <p>晚风很软，月色温柔<br>
                世间所有细碎的美好<br>
                都想悄悄分享给你</p>
                <div class="btn-group">
                    <button class="btn btn-fill" onclick="switchMain()">回到我的世界</button>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 切换页面
        const mainPage = document.getElementById('mainPage');
        const lovePage = document.getElementById('lovePage');
        const loveBox = document.getElementById('loveBox');
        let heartTimer = null;

        // 切暧昧页
        function switchLove() {
            mainPage.classList.remove('active');
            lovePage.classList.add('active');
            loveBox.style.display = 'block';
            startHeart();
        }

        // 切回暗黑主页
        function switchMain() {
            lovePage.classList.remove('active');
            mainPage.classList.add('active');
            loveBox.style.display = 'none';
            stopHeart();
        }

        // 原生爱心生成
        const heartText = ['❤', '♥', '💗', '💖', '💘'];
        function startHeart(){
            heartTimer = setInterval(()=>{
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.innerText = heartText[Math.floor(Math.random() * heartText.length)];
                let size = Math.random() * 20 + 12;
                heart.style.fontSize = size + 'px';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 5 + 's';
                loveBox.appendChild(heart);
                setTimeout(()=>heart.remove(),20000);
            },800);
        }
        function stopHeart(){
            clearInterval(heartTimer);
        }

        // 导航磨砂
        window.addEventListener('scroll',function(){
            if(window.scrollY > 80){
                document.querySelectorAll('nav').forEach(el=>el.classList.add('nav-blur'));
            }else{
                document.querySelectorAll('nav').forEach(el=>el.classList.remove('nav-blur'));
            }
        })
    </script>
</body>
</html>
