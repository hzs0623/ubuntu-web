<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daes Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            color: #2d3748;
        }

        /* 导航栏 */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 8%;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #2563eb;
        }

        .nav-menu a {
            text-decoration: none;
            color: #4a5568;
            margin-left: 2rem;
            transition: 0.3s ease;
        }

        .nav-menu a:hover {
            color: #2563eb;
        }

        /* 主容器 */
        .container {
            padding: 6rem 8%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 3.2rem;
            margin-bottom: 1.2rem;
            background: linear-gradient(90deg, #2563eb, #4f46e5);
            -webkit-background-clip: text;
            color: transparent;
        }

        .desc {
            font-size: 1.1rem;
            color: #64748b;
            max-width: 600px;
            line-height: 1.8;
            margin-bottom: 2.5rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 0.9rem 2.2rem;
            border-radius: 50px;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #2563eb;
            color: #2563eb;
        }

        .btn-outline:hover {
            background: #2563eb;
            color: #fff;
            transform: translateY(-3px);
        }

        /* 卡片区域 */
        .cards {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 5rem;
        }

        .card {
            background: #fff;
            padding: 2.2rem 1.5rem;
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.05);
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }

        .card h3 {
            margin: 1rem 0;
            color: #1e293b;
        }

        .card p {
            color: #64748b;
            line-height: 1.7;
        }

        /* 底部 */
        footer {
            text-align: center;
            padding: 3rem 0;
            color: #94a3b8;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <nav>
        <div class="logo">NicePage</div>
        <div class="nav-menu">
            <a href="#">首页</a>
            <a href="#">功能</a>
            <a href="#">关于</a>
            <a href="#">联系</a>
        </div>
    </nav>

    <!-- 主体 -->
    <div class="container">
        <h1>简约 · 精致 · 现代设计</h1>
        <p class="desc">
            采用柔和渐变、毛玻璃导航、悬浮动效、自适应布局，
            干净高级的视觉体验，适配手机、平板、电脑所有设备。
        </p>
        <div class="btn-group">
            <button class="btn btn-primary">立即开始</button>
            <button class="btn btn-outline">了解更多</button>
        </div>

        <!-- 卡片模块 -->
        <div class="cards">
            <div class="card">
                <h3>极致简洁</h3>
                <p>去除冗余元素，专注内容本身，视觉舒适不杂乱。</p>
            </div>
            <div class="card">
                <h3>流畅动画</h3>
                <p>悬浮、上浮、渐变过渡，交互体验丝滑自然。</p>
            </div>
            <div class="card">
                <h3>全端适配</h3>
                <p>自动适配手机、平板、桌面，任意屏幕完美展示。</p>
            </div>
        </div>
    </div>

    <!-- 底部 -->
    <footer>
        © 2026 NicePage · 简约高颜值网页设计
    </footer>
</body>
</html>
